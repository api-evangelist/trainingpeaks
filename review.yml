  endpointsModeled: |
    All request/response schemas in openapi/trainingpeaks-openapi.yml (AthleteProfile,
    Workout, Metric, Nutrition, Event, Route, StrengthWorkout, FileUpload, Zone) are
    MODELED from the wiki object pages and examples, not captured from live responses,
    because live reference responses require partner credentials plus an authorized
    Premium/Basic user. The WebhookSubscription request/response is CONFIRMED from the
    Webhook-Create-Subscription wiki page example.
