actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. TrainingPeaks' own public API is
    request/response JSON REST over HTTPS with OAuth 2.0, plus Early Access
    outbound webhooks (HTTP POST callbacks). No AsyncAPI document was created
    because there is no server-push transport (WebSocket or SSE) on TrainingPeaks'
    own API to model - webhooks are server-to-endpoint HTTP callbacks, not a
    persistent socket the client connects to.
