    note: Access is application-only (not for personal use); no preset hard rate limit.
  - url: https://help.trainingpeaks.com/hc/en-us/articles/234441128-TrainingPeaks-API
    type: Documentation
    note: Help Center API overview and request-access process.
  - url: https://github.com/TrainingPeaks/tp-public-api-auth
