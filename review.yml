aid: trainingpeaks
name: TrainingPeaks
review:
  question: Does TrainingPeaks expose a documented public WebSocket API?
  answer: false
  date: '2026-07-03'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  accessModel: partner-gated
  accessNote: |
    The TrainingPeaks Partners API (Public API) is partner-gated. Developers must
    apply for credentials at https://api.trainingpeaks.com/request-access and are
    individually evaluated; TrainingPeaks states it is not accepting API requests
    for personal use. Despite the gated access, the full API surface (endpoints,
    HTTP methods, OAuth scopes, and objects) is publicly documented on the
    PartnersAPI GitHub wiki, from which this entry was authored. Endpoint paths and
    methods are CONFIRMED against that wiki; request/response schemas are MODELED
    from the wiki object pages because live reference responses require partner
    credentials and an authorized user.
  asyncapiScopeNote: |
    No AsyncAPI document was authored. TrainingPeaks' own public API is
    request/response JSON REST over HTTPS. Its only push mechanism is outbound
    webhooks (Early Access) - TrainingPeaks POSTs a JSON notification to a
    partner-registered WebhookUrl on workout-created / workout-updated /
    workout-deleted events. That is server-to-endpoint HTTP, not a WebSocket or
    SSE stream on TrainingPeaks' own API, so there is no server-push transport to
    model.
findings:
  summary: |
    TrainingPeaks does not publish a documented public WebSocket API. The
    TrainingPeaks Partners API is a JSON over HTTPS REST API secured with OAuth
    2.0 (authorization_code and refresh_token grants; short-lived access tokens).
    Production base is https://api.trainingpeaks.com and sandbox is
    https://api.sandbox.trainingpeaks.com; OAuth is served from
    oauth.trainingpeaks.com (and oauth.sandbox.trainingpeaks.com). Real-time
    delivery is via outbound webhook subscriptions (Early Access), which are HTTP
    POST callbacks to a partner URL - not a WebSocket (ws:// or wss://) or SSE
    endpoint. No bidirectional or streaming socket transport is documented
    anywhere in the PartnersAPI wiki as of the review date.
  accessModel: |
    Partner-gated. Application required via api.trainingpeaks.com/request-access;
    not available for personal use. Each application is granted a fixed set of
    OAuth scopes; requesting scopes beyond the grant makes the token exchange
    fail. Access to several endpoints and workout fields is further gated by
    whether the connected athlete is Premium or Basic.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.trainingpeaks.com
      documented: true
      note: JSON REST Partners API. Sandbox base is https://api.sandbox.trainingpeaks.com.
    - protocol: OAuth2
      scheme: https
      baseURL: https://oauth.trainingpeaks.com
      documented: true
      note: Authorize + token + deauthorize endpoints. Sandbox at oauth.sandbox.trainingpeaks.com.
    - protocol: Webhook
      scheme: https
      documented: true
      note: >-
        Early Access outbound webhooks. TrainingPeaks POSTs an event notification to
        a subscribed WebhookUrl on workout-created/updated/deleted. HTTP callback,
        not WebSocket.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in the TrainingPeaks PartnersAPI wiki as of the review date.
