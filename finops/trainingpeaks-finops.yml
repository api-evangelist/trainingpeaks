description: >-
  FinOps view of TrainingPeaks spend. Two cost surfaces exist. (1) Partners API
  access has no metered API bill and no public price - it is a partner program
  with negotiated terms, so for most integrators the direct API "cost" is
  engineering and the value of the partnership rather than per-call charges.
  (2) The consumer subscriptions (athlete Premium, coach Coach Edition tiers, and
  per-athlete Premium upgrades) are the real recurring spend, and they also gate
  what data an integration can retrieve - so subscription tier is both a cost and
  a data-access lever. Because the API is not usage-metered, cost optimization
  centers on subscription mix (how many athletes need Premium) rather than call
  volume.
notes: >-
  No published usage-based API pricing to reconcile; API commercial terms are
  partner-negotiated. Consumer subscription rates should be verified on the
  TrainingPeaks pricing pages. Premium-vs-Basic status determines which
  endpoints/fields return data, so under-provisioning Premium reduces both spend
  and available data.
