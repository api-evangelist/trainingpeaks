meters:
- name: athlete_premium_subscription
  description: Athlete Premium subscription, billed monthly or annually. Unlocks premium API data.
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - billingCycle
- name: coach_subscription
  description: Coach Edition (Basic or Unlimited) subscription, billed monthly.
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - tier
- name: coach_premium_athlete
  description: Per-athlete Premium upgrade purchased by a coach, with volume discounts at scale.
  unit: athletes
  aggregation: sum
  dimensions:
  - account
  - athlete
- name: partner_api_access
  description: Partners API access. No metered per-call charge; commercial terms negotiated per partner.
  unit: contract
  aggregation: sum
  dimensions:
  - partner
principles:
- name: Visibility
  description: >-
    Track subscription counts by type (athlete Premium, coach tiers, per-athlete
    upgrades); the API is not metered, so there is no per-call spend to attribute.
- name: Allocation
  description: >-
    Map coach per-athlete Premium upgrades to the client/team they serve so
    subscription spend aligns to who consumes the premium data.
- name: Optimization
  description: >-
    Provision Premium only for athletes whose premium data (TSS/analytics,
    details, mean-max) your integration actually needs; use webhooks and
    changed-since sync to keep engineering cost down instead of scanning.
- name: Accountability
  description: >-
    Review Premium athlete counts and coach tier against actual data usage each
    billing cycle; renegotiate partner terms as user volume grows.
